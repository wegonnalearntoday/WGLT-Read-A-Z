<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Learning for Kids</title>
  </head>

  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width="960" height="600" tabindex="-1"
      style="width: 960px; height: 600px; background: #231F20"></canvas>

    <script src="Build/Web Read A-Z.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      var canvasEl = document.querySelector("#unity-canvas");

      createUnityInstance(canvasEl, {
        dataUrl: "Build/Web Read A-Z.data",
        frameworkUrl: "Build/Web Read A-Z.framework.js",
        codeUrl: "Build/Web Read A-Z.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "WGLT",
        productName: "Learning for Kids",
        productVersion: "1.0",
        // matchWebGLToCanvasSize: false,
        // devicePixelRatio: 1,
      }).then((unityInstance) => {

        // ✅ Notify Wix the game is ready
        if (window.parent) {
          window.parent.postMessage({ type: "WGLT_READY" }, "*");
        }

      }).catch((message) => {
        // Optional: still alert for debugging
        alert(message);
      });
    </script>
  </body>
</html>
